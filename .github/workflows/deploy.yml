name: HEALYX CI/CD
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/Healyx/gradlew

      - name: Build with Gradle
        run: |
          cd backend/Healyx
          ./gradlew bootJar --no-daemon

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker 이미지 빌드
        run: |
          cd backend/Healyx
          docker build -t ${{ secrets.DOCKER_USERNAME }}/healyx-app:latest .

      - name: Docker Hub push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/healyx-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/healyx-app:latest
            docker stop healyx-app || true
            docker rm healyx-app || true
            docker run -d \
              --name healyx-app \
              -p 8080:8080 \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} \
              ${{ secrets.DOCKER_USERNAME }}/healyx-app:latest
